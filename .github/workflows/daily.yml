name: Chaos Generator

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run generator
        run: python generator.py

      - name: Commit changes
        run: |
          git config --global user.name "chaos-bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "daily chaos $(date)" || echo "no changes"
          git push